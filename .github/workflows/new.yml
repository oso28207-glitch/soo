name: 📺 Up

on:
  workflow_dispatch:
    inputs:
      series_name_arabic:
        description: 'اسم المسلسل (عربي)'
        required: true
        default: 'ورود وذنوب'
      season_num:
        description: 'رقم الموسم'
        required: true
        default: '1'
        type: number
      start_episode:
        description: 'بداية الحلقات'
        required: true
        default: '5'
        type: number
      end_episode:
        description: 'نهاية الحلقات'
        required: true
        default: '15'
        type: number
      video_ids:
        description: 'قائمة معرفات الفيديو (مفصولة بفواصل)'
        required: true
        default: 'c959f6fcc,27cbc3a68,4e0779709,b8c4927dd,fd5a69b30,fb7d44c8a,f8abb5a14,7d0774e19,b1e1204e4,a4a009c3c,934810a70'

jobs:
  upload-series:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Chrome and Chromedriver
        run: |
          sudo apt-get install -y google-chrome-stable chromium-chromedriver
          google-chrome --version
          chromedriver --version

      - name: Create config
        run: |
          cat > series_config.json <<EOF
          {
            "series_name_arabic": "${{ github.event.inputs.series_name_arabic }}",
            "season_num": ${{ github.event.inputs.season_num }},
            "start_episode": ${{ github.event.inputs.start_episode }},
            "end_episode": ${{ github.event.inputs.end_episode }},
            "video_ids": [$(echo "${{ github.event.inputs.video_ids }}" | sed 's/,/","/g' | sed 's/^/"/' | sed 's/$/"/')]
          }
          EOF
          cat series_config.json

      - name: Run processor
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL: ${{ secrets.CHANNEL }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
        run: python mai.py
