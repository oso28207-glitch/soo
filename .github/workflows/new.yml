name: 📺 Uploader2

on:
  workflow_dispatch:
    inputs:
      series_name_arabic:
        description: 'اسم المسلسل (عربي)'
        required: true
        default: 'ورود وذنوب'
      season_num:
        description: 'رقم الموسم'
        required: true
        default: '1'
        type: number
      episode_urls:
        description: 'روابط الحلقات (مفصولة بفواصل)'
        required: true
        default: 'https://larozaa.xyz/play.php?vid=f57acd210,https://larozaa.xyz/play.php?vid=56d8e939c,https://larozaa.xyz/play.php?vid=cd76b5310,https://larozaa.xyz/play.php?vid=d66ecb057,https://larozaa.xyz/play.php?vid=c959f6fcc,https://larozaa.xyz/play.php?vid=27cbc3a68,https://larozaa.xyz/play.php?vid=4e0779709,https://larozaa.xyz/play.php?vid=b8c4927dd,https://larozaa.xyz/play.php?vid=fd5a69b30,https://larozaa.xyz/play.php?vid=fb7d44c8a,https://larozaa.xyz/play.php?vid=f8abb5a14,https://larozaa.xyz/play.php?vid=7d0774e19,https://larozaa.xyz/play.php?vid=b1e1204e4,https://larozaa.xyz/play.php?vid=a4a009c3c,https://larozaa.xyz/play.php?vid=934810a70,https://larozaa.xyz/play.php?vid=bcd62e737,https://larozaa.xyz/play.php?vid=07aa2f6db,https://larozaa.xyz/play.php?vid=2c71d31ae,https://larozaa.xyz/play.php?vid=d2face5c4,https://larozaa.xyz/play.php?vid=3fccb6322'

jobs:
  upload-series:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Chrome and Chromedriver
        run: |
          sudo apt-get install -y google-chrome-stable chromium-chromedriver
          google-chrome --version
          chromedriver --version

      - name: Create config
        run: |
          # تقسيم الروابط المدخلة إلى مصفوفة
          IFS=',' read -r -a urls <<< "${{ github.event.inputs.episode_urls }}"
          echo '{' > series_config.json
          echo '  "series_name_arabic": "${{ github.event.inputs.series_name_arabic }}",' >> series_config.json
          echo '  "season_num": ${{ github.event.inputs.season_num }},' >> series_config.json
          echo '  "episodes": [' >> series_config.json
          idx=1
          for url in "${urls[@]}"; do
            echo '    {"num": '$idx', "url": "'$url'"}' >> series_config.json
            if [ $idx -lt ${#urls[@]} ]; then echo ',' >> series_config.json; fi
            idx=$((idx+1))
          done
          echo '  ]' >> series_config.json
          echo '}' >> series_config.json
          cat series_config.json

      - name: Run processor
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL: ${{ secrets.CHANNEL }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
        run: python main2.py
