name: 📺 Up

on:
  workflow_dispatch:
    inputs:
      series_name_arabic:
        description: 'اسم المسلسل (عربي)'
        required: true
        default: 'ورود وذنوب'
      season_num:
        description: 'رقم الموسم'
        required: true
        default: '1'
        type: number
      episode_num:
        description: 'رقم الحلقة'
        required: true
        default: '56'
        type: number
      video_url:
        description: 'رابط صفحة المشاهدة (play.php?vid=...)'
        required: true
        default: 'https://larozaa.xyz/play.php?vid=72c5aacd6'

jobs:
  upload-series:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ffmpeg (if not present)
        run: |
          if ! command -v ffmpeg &> /dev/null; then
            echo "ffmpeg not found, installing..."
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends ffmpeg
          else
            echo "ffmpeg already installed"
          fi

      - name: Install Chrome
        run: |
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Install Chromedriver
        run: |
          sudo apt-get install -y chromium-chromedriver
          chromedriver --version

      - name: Create config
        run: |
          cat > series_config.json <<EOF
          {
            "series_name_arabic": "${{ github.event.inputs.series_name_arabic }}",
            "season_num": ${{ github.event.inputs.season_num }},
            "episode_num": ${{ github.event.inputs.episode_num }},
            "video_url": "${{ github.event.inputs.video_url }}"
          }
          EOF

      - name: Run processor
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          CHANNEL: ${{ secrets.CHANNEL }}
          STRING_SESSION: ${{ secrets.STRING_SESSION }}
        run: python mai.py
